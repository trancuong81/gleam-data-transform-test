syntax = "proto3";

package ocaml_data_transform;

import "data_types.proto";
import "google/protobuf/struct.proto";

// SingleFieldType — represents one field in a table schema.
// The value is stored as a generic Struct; type_id discriminates the concrete type.
message SingleFieldType {
  google.protobuf.Struct value = 1;
  string type_id = 2;
  string label = 3;
}

// Group of fields within a table
message FieldGroup {
  string label = 1;
  int32 start_idx = 2;
  int32 end_idx = 3;
}

// TableSchema — the top-level table structure
message TableSchema {
  map<string, SingleFieldType> fields_map = 1;
  repeated string field_keys_in_order = 2;
  string label = 3;
  repeated FieldGroup groups = 4;
}
